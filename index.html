<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>語学フラッシュカード</title>
<style>
:root{--bg:#f4f6f8;--panel:#fff;--text:#18212b;--muted:#687684;--border:#dce3e9;--primary:#1769aa;--danger:#b3261e;--shadow:0 14px 38px rgba(21,37,53,.12)}
@media(prefers-color-scheme:dark){:root{--bg:#101418;--panel:#1a2026;--text:#edf2f6;--muted:#a9b4be;--border:#34404a;--primary:#66b5ff;--danger:#ff9b94;--shadow:0 14px 38px rgba(0,0,0,.34)}}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
.app{width:min(760px,calc(100% - 28px));margin:auto;padding:24px 0 50px}h1{margin:0 0 5px;font-size:clamp(22px,5vw,32px)}.subtitle{color:var(--muted);font-size:14px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px}.settings{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}
select,button{appearance:none;border-radius:13px;padding:13px 14px;font:inherit;font-weight:700}select{width:100%;background:var(--panel);color:var(--text);border:1px solid var(--border)}button{border:0;cursor:pointer}
.toggle-row{display:flex;align-items:center;gap:10px}.toggle-row input{width:20px;height:20px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
.stat{padding:12px 8px;text-align:center;border:1px solid var(--border);border-radius:13px;background:var(--panel)}.stat strong{display:block;font-size:21px}.stat span{color:var(--muted);font-size:12px}
.card-wrap{perspective:1200px;margin:18px 0}.card{min-height:330px;position:relative;transform-style:preserve-3d;transition:transform .45s;cursor:pointer;user-select:none}.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;display:grid;place-items:center;padding:30px;border-radius:24px;border:1px solid var(--border);background:var(--panel);box-shadow:var(--shadow);backface-visibility:hidden}.back{transform:rotateY(180deg)}
.face-label{position:absolute;top:18px;left:20px;color:var(--muted);font-size:13px}.word{text-align:center;font-size:clamp(34px,8vw,60px);font-weight:750;line-height:1.35;overflow-wrap:anywhere}.word small{display:block;font-size:.45em;font-weight:600;margin-top:12px;color:var(--muted)}
.hint{position:absolute;bottom:16px;color:var(--muted);font-size:13px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px}button:disabled{opacity:.45}.again{background:color-mix(in srgb,var(--danger) 13%,var(--panel));color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 38%,var(--border))}.known{background:var(--primary);color:white}.secondary{background:transparent;color:var(--text);border:1px solid var(--border)}.small-actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}.small-actions button{padding:10px 12px;font-size:13px}.empty{min-height:330px;display:grid;place-items:center;text-align:center;border:1px dashed var(--border);border-radius:24px;background:var(--panel);padding:30px}
@media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}.settings{grid-template-columns:1fr}.card,.empty{min-height:300px}}
</style>
</head>
<body><main class="app">
<header><h1 id="title">語学フラッシュカード</h1><div id="subtitle" class="subtitle"></div></header>
<section class="panel settings">
<div><label class="subtitle">教材</label><select id="deckSelect"></select></div>
<label class="toggle-row"><input id="srsToggle" type="checkbox"><span><strong>忘却曲線モード</strong><br><small class="subtitle">復習日に再出題</small></span></label>
<button id="shuffleBtn" class="secondary">順番をシャッフル</button>
</section>
<section class="stats"><div class="stat"><strong id="remainingCount">0</strong><span>今回の残り</span></div><div class="stat"><strong id="masteredCount">0</strong><span>習得済み</span></div><div class="stat"><strong id="wrongCount">0</strong><span>誤答回数</span></div><div class="stat"><strong id="totalCount">0</strong><span>全単語</span></div></section>
<section id="studyArea"><div class="card-wrap"><div id="card" class="card" tabindex="0">
<div class="face front"><span class="face-label">日本語</span><div id="frontText" class="word"></div><span class="hint">タップして答えを見る</span></div>
<div class="face back"><span id="backLabel" class="face-label"></span><div id="backText" class="word"></div><span class="hint">結果を選んで次へ</span></div>
</div></div><div class="controls"><button id="againBtn" class="again" disabled>もう一度</button><button id="knownBtn" class="known" disabled>覚えた</button></div></section>
<section id="emptyArea" class="empty" hidden><div><h2>今回の学習は完了です</h2><p>未習得の単語はありません。</p><button id="restartBtn" class="secondary">再開</button></div></section>
<section class="small-actions"><button id="resetSessionBtn" class="secondary">今回の順番を作り直す</button><button id="resetAllBtn" class="secondary">この教材の履歴を初期化</button></section>
</main>

const DAY=86400000,$=id=>document.getElementById(id);
let deckId=localStorage.getItem("language-flashcards:last-deck")||"taigi",deck,words,state,queue=[],current=null,flipped=false;
function blank(){return{mastered:false,wrong:0,streak:0,due:0}}
function key(){return `language-flashcards:${deckId}:v1`}
function load(){let x;try{x=JSON.parse(localStorage.getItem(key()))}catch{}if(!x)x={progress:{},srs:false};words.forEach(w=>x.progress[w.id]??=blank());return x}
function save(){localStorage.setItem(key(),JSON.stringify(state))}
function mix(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function selectDeck(id){deckId=id;deck=DECKS[id];words=deck.words;state=load();localStorage.setItem("language-flashcards:last-deck",id);$("subtitle").textContent=deck.subtitle;$("backLabel").textContent=deck.backLabel;$("srsToggle").checked=state.srs;build()}
function eligible(w){const p=state.progress[w.id]||blank();return !p.mastered||(state.srs&&p.due<=Date.now())}
function build(){queue=mix(words.filter(eligible).map(w=>w.id));current=null;next()}
function next(){flipped=false;$("card").classList.remove("flipped");$("againBtn").disabled=$("knownBtn").disabled=true;current=queue.shift()||null;if(!current){$("studyArea").hidden=true;$("emptyArea").hidden=false;stats();return}const w=words.find(x=>x.id===current);$("frontText").textContent=w.ja;$("backText").innerHTML=w.answer;$("studyArea").hidden=false;$("emptyArea").hidden=true;stats()}
function flip(){if(!current)return;flipped=!flipped;$("card").classList.toggle("flipped",flipped);$("againBtn").disabled=$("knownBtn").disabled=!flipped}
function again(){if(!current||!flipped)return;const p=state.progress[current];p.mastered=false;p.wrong++;p.streak=0;p.due=0;queue.splice(Math.min(2,queue.length),0,current);save();next()}
function known(){if(!current||!flipped)return;const p=state.progress[current];p.mastered=true;p.streak++;p.due=state.srs?Date.now()+[1,3,7,14,30,60][Math.min(p.streak-1,5)]*DAY:Number.MAX_SAFE_INTEGER;save();next()}
function stats(){const ps=words.map(w=>state.progress[w.id]||blank());$("remainingCount").textContent=queue.length+(current?1:0);$("masteredCount").textContent=ps.filter(p=>p.mastered).length;$("wrongCount").textContent=ps.reduce((s,p)=>s+p.wrong,0);$("totalCount").textContent=words.length}
Object.entries(DECKS).forEach(([id,d])=>{const o=document.createElement("option");o.value=id;o.textContent=d.label;$("deckSelect").appendChild(o)});$("deckSelect").value=deckId;
$("deckSelect").onchange=e=>selectDeck(e.target.value);$("card").onclick=flip;$("card").onkeydown=e=>{if(e.code==="Space"||e.code==="Enter"){e.preventDefault();flip()}};$("againBtn").onclick=again;$("knownBtn").onclick=known;$("shuffleBtn").onclick=build;$("restartBtn").onclick=build;$("resetSessionBtn").onclick=build;$("resetAllBtn").onclick=()=>{if(confirm("この教材の学習履歴を初期化しますか？")){state={progress:{},srs:state.srs};words.forEach(w=>state.progress[w.id]=blank());save();build()}};$("srsToggle").onchange=e=>{state.srs=e.target.checked;save();build()};
selectDeck(deckId);
</script></body></html>
