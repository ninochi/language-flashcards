<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1769aa">
  <title>語学フラッシュカード</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
  <script src="taigi-rendering.js" defer></script>
</head>
<body>
  <!-- Flashcard data is loaded from data/manifest.json and data/decks/*.json. -->
  <main class="app">
    <header>
      <h1>語学フラッシュカード</h1>
      <div id="subtitle" class="subtitle">教材を読み込んでいます…</div>
    </header>

    <section class="panel settings">
      <div>
        <label class="subtitle" for="deckSelect">教材</label>
        <select id="deckSelect" disabled></select>
      </div>
      <div class="settings-actions">
        <button id="shuffleBtn" class="secondary" disabled>このモードをシャッフル</button>
        <button class="danger-outline reset-history" disabled>学習記録をリセット</button>
      </div>
      <div class="mode-tabs" aria-label="学習モード">
        <button class="mode-tab active" data-mode="all" disabled>カード</button>
        <button class="mode-tab" data-mode="unknown" disabled>分からなかっただけ</button>
        <button class="mode-tab" data-mode="quiz" disabled>クイズ</button>
      </div>
      <p class="review-policy">カードは「分からなかった・分かった」だけで記録します。クイズは既存カードから4択を自動生成します。</p>
    </section>

    <section class="stats" aria-label="学習状況">
      <div id="remainingStat" class="stat"><strong id="remainingCount">0</strong><span id="remainingLabel">今回の残り</span></div>
      <div id="unknownStat" class="stat"><strong id="unknownCount">0</strong><span id="unknownLabel">分からなかった</span></div>
      <div id="quizWrongStat" class="stat"><strong id="quizWrongCount">0</strong><span id="quizWrongLabel">クイズ間違い</span></div>
      <div id="totalStat" class="stat"><strong id="totalCount">0</strong><span id="totalLabel">全単語</span></div>
    </section>

    <section id="studyArea" hidden>
      <div class="card-wrap">
        <div id="card" class="card" tabindex="0" role="button" aria-label="カードをめくる">
          <div id="cardFront" class="face front" aria-hidden="false">
            <span class="face-label">日本語</span>
            <div class="card-meta">
              <span id="cardBadge" class="card-badge" data-kind="new">新しいカード</span>
              <span id="cardReason" class="card-reason"></span>
            </div>
            <div id="frontText" class="word"></div>
            <span class="hint">タップして答えを見る</span>
          </div>
          <div id="cardBack" class="face back" aria-hidden="true">
            <span id="backLabel" class="face-label"></span>
            <div id="backText" class="word"></div>
            <span class="hint">結果を選んで次へ</span>
          </div>
        </div>
      </div>
      <div class="controls">
        <button id="unknownBtn" class="unknown" disabled>分からなかった</button>
        <button id="knownBtn" class="easy" disabled>分かった</button>
      </div>
    </section>

    <section id="quizArea" hidden>
      <div class="quiz-card">
        <div class="card-meta quiz-meta">
          <span id="quizBadge" class="card-badge" data-kind="new">クイズ</span>
          <span id="quizReason" class="card-reason"></span>
        </div>
        <span class="face-label">日本語</span>
        <div id="quizPrompt" class="word"></div>
        <div id="quizOptions" class="quiz-options" aria-label="選択肢"></div>
        <div id="quizFeedback" class="quiz-feedback" aria-live="polite"></div>
        <button id="quizNextBtn" class="secondary" hidden>次の問題</button>
      </div>
    </section>

    <section id="emptyArea" class="empty" hidden>
      <div>
        <h2 id="emptyTitle">この回のカードを一通り見ました</h2>
        <p id="emptyMessage"></p>
        <div class="empty-actions">
          <button id="continueBtn" class="secondary">もう一周する</button>
          <button id="emptyUnknownBtn" class="secondary">分からなかっただけ</button>
          <button id="emptyQuizBtn" class="secondary">クイズ</button>
          <button class="danger-outline reset-history">学習記録をリセット</button>
        </div>
      </div>
    </section>

    <section id="errorArea" class="empty" hidden>
      <div>
        <h2>教材を読み込めませんでした</h2>
        <p id="errorMessage">通信状態を確認して、再読み込みしてください。</p>
        <button id="retryBtn" class="secondary">再読み込み</button>
      </div>
    </section>

    <div id="celebration" class="celebration" role="status" aria-live="polite" hidden>
      <div id="confettiStage" class="confetti-stage" aria-hidden="true"></div>
      <div id="celebrationMessage" class="celebration-message"></div>
    </div>
  </main>
</body>
</html>
