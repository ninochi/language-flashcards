<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1769aa">
  <title>語学フラッシュカード</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
  <script src="taigi-rendering.js" defer></script>
</head>
<body>
  <!-- Flashcard data is loaded from data/manifest.json and data/decks/*.json. -->
  <main class="app">
    <header>
      <h1>語学フラッシュカード</h1>
      <div id="subtitle" class="subtitle">教材を読み込んでいます…</div>
    </header>

    <section class="panel settings">
      <div>
        <label class="subtitle" for="deckSelect">教材</label>
        <select id="deckSelect" disabled></select>
      </div>
      <button id="shuffleBtn" class="secondary" disabled>出題順をシャッフル</button>
      <p class="review-policy">答えを見る前の感覚で「分からなかった・迷った・すぐ分かった」を選びます。</p>
    </section>

    <section class="stats" aria-label="学習状況">
      <div class="stat"><strong id="remainingCount">0</strong><span>今回の残り</span></div>
      <div class="stat"><strong id="easyCount">0</strong><span>すぐ分かった</span></div>
      <div class="stat"><strong id="unsureCount">0</strong><span>迷いカード</span></div>
      <div class="stat"><strong id="totalCount">0</strong><span>全単語</span></div>
    </section>

    <section id="studyArea" hidden>
      <div class="card-wrap">
        <div id="card" class="card" tabindex="0" role="button" aria-label="カードをめくる">
          <div id="cardFront" class="face front" aria-hidden="false">
            <span class="face-label">日本語</span>
            <div class="card-meta">
              <span id="cardBadge" class="card-badge" data-kind="new">新しいカード</span>
              <span id="cardReason" class="card-reason"></span>
            </div>
            <div id="frontText" class="word"></div>
            <span class="hint">タップして答えを見る</span>
          </div>
          <div id="cardBack" class="face back" aria-hidden="true">
            <span id="backLabel" class="face-label"></span>
            <div id="backText" class="word"></div>
            <span class="hint">結果を選んで次へ</span>
          </div>
        </div>
      </div>
      <div class="controls">
        <button id="unknownBtn" class="unknown" disabled>分からなかった</button>
        <button id="unsureBtn" class="unsure" disabled>迷った</button>
        <button id="easyBtn" class="easy" disabled>すぐ分かった</button>
      </div>
    </section>

    <section id="emptyArea" class="empty" hidden>
      <div>
        <h2>この回のカードを一通り見ました</h2>
        <p id="emptyMessage"></p>
        <div class="empty-actions">
          <button id="continueBtn" class="secondary">もう一周する</button>
          <button id="resetAllBtn" class="danger-outline">学習記録をリセット</button>
        </div>
      </div>
    </section>

    <section id="errorArea" class="empty" hidden>
      <div>
        <h2>教材を読み込めませんでした</h2>
        <p id="errorMessage">通信状態を確認して、再読み込みしてください。</p>
        <button id="retryBtn" class="secondary">再読み込み</button>
      </div>
    </section>

    <div id="celebration" class="celebration" role="status" aria-live="polite" hidden>
      <div id="confettiStage" class="confetti-stage" aria-hidden="true"></div>
      <div id="celebrationMessage" class="celebration-message"></div>
    </div>
  </main>
</body>
</html>
