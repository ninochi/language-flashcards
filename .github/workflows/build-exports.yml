name: Build exports

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "data/**"
      - "scripts/build_exports.py"
      - "scripts/validate_data.py"
      - ".github/workflows/build-exports.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 scripts/validate_data.py
      - run: python3 scripts/build_exports.py
      - name: Commit generated exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports
          git diff --cached --quiet || git commit -m "Rebuild flashcard exports"
          git push
