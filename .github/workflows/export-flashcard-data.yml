name: Export flashcard data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/export-flashcard-data.yml'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export JSON and YAML
        shell: python
        run: |
          from pathlib import Path
          import json, re, shutil

          html = Path('index.html').read_text(encoding='utf-8')
          m = re.search(r'const DECKS=(\{.*?\});\nconst DAY=', html, re.S)
          if not m:
              raise SystemExit('DECKS data not found')
          decks = json.loads(m.group(1))

          root = Path('exports/language-flashcards-data')
          if root.exists():
              shutil.rmtree(root)
          (root / 'json').mkdir(parents=True)
          (root / 'yaml').mkdir(parents=True)

          def yaml_scalar(value):
              if value is None:
                  return 'null'
              s = str(value)
              return json.dumps(s, ensure_ascii=False)

          def dump_yaml(data):
              lines = []
              for key in ['id','language','title','frontLanguage','backLanguage','cardCount']:
                  lines.append(f'{key}: {yaml_scalar(data[key])}' if isinstance(data[key], str) else f'{key}: {data[key]}')
              lines.append('cards:')
              for card in data['cards']:
                  lines.append(f'  - id: {yaml_scalar(card["id"])}')
                  lines.append(f'    front: {yaml_scalar(card["front"])}')
                  lines.append(f'    back: {yaml_scalar(card["back"])}')
                  lines.append(f'    reading: {yaml_scalar(card["reading"])}' if card['reading'] is not None else '    reading: null')
                  lines.append(f'    lesson: {card["lesson"]}' if card['lesson'] is not None else '    lesson: null')
                  lines.append('    page: null')
                  lines.append('    tags: []')
                  lines.append('    notes: null')
              return '\n'.join(lines) + '\n'

          manifest = []
          for deck_id, deck in decks.items():
              is_taigi = deck_id == 'taigi'
              lesson = None if is_taigi else int(deck_id.split('-')[-1])
              cards = []
              for w in deck['words']:
                  ans = w['answer']
                  if is_taigi:
                      back, reading = ans, None
                  else:
                      mm = re.fullmatch(r'(.*?)<br><small>(.*?)</small>', ans, re.S)
                      if not mm:
                          raise SystemExit(f'Unexpected answer format: {deck_id} {w["id"]}')
                      back, reading = mm.group(1), mm.group(2)
                  cards.append({
                      'id': w['id'], 'front': w['ja'], 'back': back,
                      'reading': reading, 'lesson': lesson,
                      'page': None, 'tags': [], 'notes': None
                  })
              filename = 'taigi' if is_taigi else f'chinese-lesson-{lesson:02d}'
              data = {
                  'id': filename,
                  'language': 'nan-Latn' if is_taigi else 'zh-CN',
                  'title': deck['label'],
                  'frontLanguage': 'ja',
                  'backLanguage': 'nan-Latn' if is_taigi else 'zh-CN',
                  'cardCount': len(cards),
                  'cards': cards
              }
              (root / 'json' / f'{filename}.json').write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
              (root / 'yaml' / f'{filename}.yaml').write_text(dump_yaml(data), encoding='utf-8')
              manifest.append({'id': filename, 'title': deck['label'], 'cardCount': len(cards)})

          schema = {
            '$schema':'https://json-schema.org/draft/2020-12/schema',
            'title':'Language Flashcard Deck', 'type':'object',
            'required':['id','language','title','frontLanguage','backLanguage','cardCount','cards'],
            'properties':{
              'id':{'type':'string'}, 'language':{'type':'string'}, 'title':{'type':'string'},
              'frontLanguage':{'type':'string'}, 'backLanguage':{'type':'string'},
              'cardCount':{'type':'integer','minimum':0},
              'cards':{'type':'array','items':{'type':'object','required':['id','front','back','reading','lesson','page','tags','notes'],
                'properties':{'id':{'type':'string'},'front':{'type':'string'},'back':{'type':'string'},
                'reading':{'type':['string','null']},'lesson':{'type':['integer','null']},
                'page':{'type':['integer','null']},'tags':{'type':'array','items':{'type':'string'}},
                'notes':{'type':['string','null']}}}}
            }
          }
          (root / 'schema.json').write_text(json.dumps(schema, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          (root / 'manifest.json').write_text(json.dumps({'decks': manifest}, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          total = sum(x['cardCount'] for x in manifest)
          readme = f'''# Language Flashcards Data\n\n台湾語と中国語第1課〜第8課のフラッシュカードデータです。\n\n- JSON: アプリやプログラムでの利用向け\n- YAML: 人が確認・編集しやすい形式\n- 合計カード数: {total}\n- 学習履歴は含みません（ブラウザの localStorage に保存されています）\n\n各カードの `page`、`tags`、`notes` は、現行アプリに元情報がないため `null` または空配列です。\n'''
          (root / 'README.md').write_text(readme, encoding='utf-8')
      - name: Commit exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/language-flashcards-data
          git diff --cached --quiet || git commit -m "Export flashcard data as JSON and YAML"
          git push
