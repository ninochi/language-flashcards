name: Dispatch JSON refactor

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Start refactor workflow
        run: gh workflow run refactor-json-source.yml --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
