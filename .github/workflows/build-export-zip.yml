name: Build export ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-export-zip.yml'

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create ZIP
        run: |
          cd exports
          rm -f language-flashcards-data.zip
          zip -r language-flashcards-data.zip language-flashcards-data
      - name: Commit ZIP
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/language-flashcards-data.zip
          git diff --cached --quiet || git commit -m "Build flashcard data ZIP"
          git push
