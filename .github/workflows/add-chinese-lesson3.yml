name: Add Chinese Lesson 3

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/add-chinese-lesson3.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index
        shell: python
        run: |
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          if '"chinese-3"' in s:
              raise SystemExit(0)
          deck = '''{"label":"中国語 第3課","subtitle":"表：日本語 ／ 裏：中国語＋拼音","backLabel":"中国語・拼音","words":[{"id":"c3-001","ja":"知っている、分かっている","answer":"知道<br><small>zhīdào</small>"},{"id":"c3-002","ja":"どこ","answer":"哪儿<br><small>nǎr</small>"},{"id":"c3-003","ja":"座る、乗り物に乗る","answer":"坐<br><small>zuò</small>"},{"id":"c3-004","ja":"～は？、～については？","answer":"呢<br><small>ne</small>"},{"id":"c3-005","ja":"地下鉄","answer":"地铁<br><small>dìtiě</small>"},{"id":"c3-006","ja":"よい、分かった","answer":"好<br><small>hǎo</small>"},{"id":"c3-007","ja":"待つ","answer":"等<br><small>děng</small>"},{"id":"c3-008","ja":"～しましょう、～でしょう","answer":"吧<br><small>ba</small>"},{"id":"c3-009","ja":"演奏する","answer":"演奏<br><small>yǎnzòu</small>"},{"id":"c3-010","ja":"人","answer":"人<br><small>rén</small>"},{"id":"c3-011","ja":"あなたは？","answer":"你呢？<br><small>nǐ ne</small>"},{"id":"c3-012","ja":"しかし、ただし","answer":"不过<br><small>búguò</small>"},{"id":"c3-013","ja":"その他の","answer":"其他<br><small>qítā</small>"},{"id":"c3-014","ja":"ロッカー、荷物預かり","answer":"储物柜<br><small>chǔwùguì</small>"},{"id":"c3-015","ja":"中、中部","answer":"里面<br><small>lǐmiàn</small>"},{"id":"c3-016","ja":"孫（姓）","answer":"孙<br><small>Sūn</small>"},{"id":"c3-017","ja":"先生、教師","answer":"老师<br><small>lǎoshī</small>"},{"id":"c3-018","ja":"周（姓）","answer":"周<br><small>Zhōu</small>"},{"id":"c3-019","ja":"エレベーター","answer":"电梯<br><small>diàntī</small>"},{"id":"c3-020","ja":"故郷、実家","answer":"老家<br><small>lǎojiā</small>"},{"id":"c3-021","ja":"以前、昔","answer":"以前<br><small>yǐqián</small>"},{"id":"c3-022","ja":"風邪薬","answer":"感冒药<br><small>gǎnmàoyào</small>"},{"id":"c3-023","ja":"ノート","answer":"笔记本<br><small>bǐjìběn</small>"},{"id":"c3-024","ja":"訪問する、訪ねる","answer":"拜访<br><small>bàifǎng</small>"},{"id":"c3-025","ja":"教授","answer":"教授<br><small>jiàoshòu</small>"},{"id":"c3-026","ja":"胡（姓）","answer":"胡<br><small>Hú</small>"},{"id":"c3-027","ja":"住む、泊まる","answer":"住<br><small>zhù</small>"},{"id":"c3-028","ja":"発する、送る","answer":"发<br><small>fā</small>"},{"id":"c3-029","ja":"メール、郵便物","answer":"邮件<br><small>yóujiàn</small>"},{"id":"c3-030","ja":"放送、ラジオ","answer":"广播<br><small>guǎngbō</small>"},{"id":"c3-031","ja":"学ぶ、習う","answer":"学<br><small>xué</small>"},{"id":"c3-032","ja":"ネズミ","answer":"鼠<br><small>shǔ</small>"},{"id":"c3-033","ja":"ブタ","answer":"猪<br><small>zhū</small>"},{"id":"c3-034","ja":"イヤホン、ヘッドホン","answer":"耳机<br><small>ěrjī</small>"},{"id":"c3-035","ja":"身につける、かぶる","answer":"戴<br><small>dài</small>"},{"id":"c3-036","ja":"眼鏡","answer":"眼镜<br><small>yǎnjìng</small>"},{"id":"c3-037","ja":"女の子","answer":"女孩子<br><small>nǚháizi</small>"},{"id":"c3-038","ja":"年下の女性のいとこ","answer":"表妹<br><small>biǎomèi</small>"},{"id":"c3-039","ja":"する、作る","answer":"做<br><small>zuò</small>"},{"id":"c3-040","ja":"建築、建物","answer":"建筑<br><small>jiànzhù</small>"},{"id":"c3-041","ja":"模型、モデル","answer":"模型<br><small>móxíng</small>"},{"id":"c3-042","ja":"台所、キッチン","answer":"厨房<br><small>chúfáng</small>"},{"id":"c3-043","ja":"焼く、あぶる","answer":"烤<br><small>kǎo</small>"},{"id":"c3-044","ja":"サンマ","answer":"秋刀鱼<br><small>qiūdāoyú</small>"},{"id":"c3-045","ja":"味、におい","answer":"味道<br><small>wèidào</small>"},{"id":"c3-046","ja":"週末","answer":"周末<br><small>zhōumò</small>"},{"id":"c3-047","ja":"香山","answer":"香山<br><small>Xiāngshān</small>"},{"id":"c3-048","ja":"歌う","answer":"唱<br><small>chàng</small>"},{"id":"c3-049","ja":"カラオケ","answer":"卡拉OK<br><small>kǎlā OK</small>"},{"id":"c3-050","ja":"どうですか、どのようですか","answer":"怎么样<br><small>zěnmeyàng</small>"},{"id":"c3-051","ja":"野球","answer":"棒球<br><small>bàngqiú</small>"},{"id":"c3-052","ja":"北京","answer":"北京<br><small>Běijīng</small>"},{"id":"c3-053","ja":"旅行する","answer":"旅游<br><small>lǚyóu</small>"}]}'''
          marker = '};\nconst DAY='
          if marker not in s:
              raise SystemExit('DECKS marker not found')
          s = s.replace(marker, ',"chinese-3":' + deck + '};\nconst DAY=', 1)
          p.write_text(s, encoding='utf-8')
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Add Chinese lesson 3 deck"
          git push
