name: Validate data

on:
  pull_request:
    paths:
      - "data/**"
      - "scripts/validate_data.py"
      - ".github/workflows/validate-data.yml"
  push:
    branches: ["main"]
    paths:
      - "data/**"
      - "scripts/validate_data.py"
      - ".github/workflows/validate-data.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 scripts/validate_data.py
