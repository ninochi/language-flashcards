name: Install and deploy Chinese Lesson 8

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/install-and-deploy-lesson8.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  install-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index
        shell: python
        run: |
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          if '"chinese-8"' not in s:
              deck = '''{"label":"中国語 第8課","subtitle":"表：日本語 ／ 裏：中国語＋拼音","backLabel":"中国語・拼音","words":[{"id":"c8-001","ja":"支払う、渡す","answer":"付<br><small>fù</small>"},{"id":"c8-002","ja":"現金","answer":"现金<br><small>xiànjīn</small>"},{"id":"c8-003","ja":"用いる、～で","answer":"用<br><small>yòng</small>"},{"id":"c8-004","ja":"WeChat","answer":"微信<br><small>Wēixìn</small>"},{"id":"c8-005","ja":"支払う、決済する","answer":"支付<br><small>zhīfù</small>"},{"id":"c8-006","ja":"いつも、常に","answer":"总是<br><small>zǒngshì</small>"},{"id":"c8-007","ja":"遠慮深い、丁寧である","answer":"客气<br><small>kèqi</small>"},{"id":"c8-008","ja":"体、身体","answer":"身体<br><small>shēntǐ</small>"},{"id":"c8-009","ja":"快適である、気分がよい","answer":"舒服<br><small>shūfu</small>"},{"id":"c8-010","ja":"世話をする、面倒を見る","answer":"照顾<br><small>zhàogù</small>"},{"id":"c8-011","ja":"少ない","answer":"少<br><small>shǎo</small>"},{"id":"c8-012","ja":"めまいがする","answer":"晕<br><small>yūn</small>"},{"id":"c8-013","ja":"少し、ちょっと","answer":"点儿<br><small>diǎnr</small>"},{"id":"c8-014","ja":"受付をする、診察の手続きをする","answer":"挂号<br><small>guàhào</small>"},{"id":"c8-015","ja":"内科","answer":"内科<br><small>nèikē</small>"},{"id":"c8-016","ja":"診察室","answer":"诊室<br><small>zhěnshì</small>"},{"id":"c8-017","ja":"ドア、門","answer":"门<br><small>mén</small>"},{"id":"c8-018","ja":"よくなった、治った","answer":"好了<br><small>hǎole</small>"},{"id":"c8-019","ja":"費用を支払う","answer":"交费<br><small>jiāofèi</small>"},{"id":"c8-020","ja":"カードで支払う","answer":"刷卡<br><small>shuākǎ</small>"},{"id":"c8-021","ja":"窓口","answer":"窗口<br><small>chuāngkǒu</small>"},{"id":"c8-022","ja":"ホール、ロビー","answer":"大厅<br><small>dàtīng</small>"},{"id":"c8-023","ja":"自動端末、セルフ端末","answer":"自助机<br><small>zìzhùjī</small>"},{"id":"c8-024","ja":"操作する","answer":"操作<br><small>cāozuò</small>"},{"id":"c8-025","ja":"電子の","answer":"电子<br><small>diànzǐ</small>"},{"id":"c8-026","ja":"便利である","answer":"方便<br><small>fāngbiàn</small>"},{"id":"c8-027","ja":"いくつか、少し","answer":"一些<br><small>yìxiē</small>"},{"id":"c8-028","ja":"通る、経験する","answer":"过<br><small>guò</small>"},{"id":"c8-029","ja":"字、文字","answer":"字<br><small>zì</small>"},{"id":"c8-030","ja":"きまりが悪い、恥ずかしい","answer":"难为情<br><small>nánwéiqíng</small>"},{"id":"c8-031","ja":"残る、残しておく","answer":"剩下<br><small>shèngxià</small>"},{"id":"c8-032","ja":"仕事、作業","answer":"活儿<br><small>huór</small>"},{"id":"c8-033","ja":"する、働く","answer":"干<br><small>gàn</small>"},{"id":"c8-034","ja":"道、道路","answer":"路<br><small>lù</small>"},{"id":"c8-035","ja":"郷に入っては郷に従う","answer":"入乡随俗<br><small>rù xiāng suí sú</small>"},{"id":"c8-036","ja":"他人、ほかの人","answer":"别人<br><small>biérén</small>"},{"id":"c8-037","ja":"守る","answer":"守<br><small>shǒu</small>"},{"id":"c8-038","ja":"規則、決まり","answer":"规矩<br><small>guīju</small>"},{"id":"c8-039","ja":"インフルエンサー、ネット有名人","answer":"网红<br><small>wǎnghóng</small>"},{"id":"c8-040","ja":"レストラン、食堂","answer":"餐厅<br><small>cāntīng</small>"},{"id":"c8-041","ja":"食事をする","answer":"吃饭<br><small>chīfàn</small>"},{"id":"c8-042","ja":"予約する","answer":"预约<br><small>yùyuē</small>"},{"id":"c8-043","ja":"太っている","answer":"胖<br><small>pàng</small>"},{"id":"c8-044","ja":"ダイエットする、減量する","answer":"减肥<br><small>jiǎnféi</small>"},{"id":"c8-045","ja":"朝食","answer":"早饭<br><small>zǎofàn</small>"},{"id":"c8-046","ja":"ご飯、炊いた米","answer":"米饭<br><small>mǐfàn</small>"},{"id":"c8-047","ja":"タクシーを呼ぶ、タクシーに乗る","answer":"打车<br><small>dǎchē</small>"},{"id":"c8-048","ja":"一気に","answer":"一口气<br><small>yìkǒuqì</small>"},{"id":"c8-049","ja":"腕立て伏せ","answer":"俯卧撑<br><small>fǔwòchēng</small>"},{"id":"c8-050","ja":"酔う、酔っている","answer":"醉<br><small>zuì</small>"},{"id":"c8-051","ja":"大きい","answer":"大<br><small>dà</small>"},{"id":"c8-052","ja":"音声、発音","answer":"语音<br><small>yǔyīn</small>"},{"id":"c8-053","ja":"入力する","answer":"输入<br><small>shūrù</small>"},{"id":"c8-054","ja":"文字を入力する、タイピングする","answer":"打字<br><small>dǎzì</small>"},{"id":"c8-055","ja":"速い","answer":"快<br><small>kuài</small>"},{"id":"c8-056","ja":"梅雨","answer":"梅雨<br><small>méiyǔ</small>"},{"id":"c8-057","ja":"季節","answer":"季节<br><small>jìjié</small>"},{"id":"c8-058","ja":"市の中心部、中心街","answer":"市中心<br><small>shìzhōngxīn</small>"},{"id":"c8-059","ja":"にぎやかである","answer":"热闹<br><small>rènao</small>"},{"id":"c8-060","ja":"寒い、冷たい","answer":"冷<br><small>lěng</small>"},{"id":"c8-061","ja":"静かである","answer":"安静<br><small>ānjìng</small>"},{"id":"c8-062","ja":"場所、所","answer":"地方<br><small>dìfang</small>"},{"id":"c8-063","ja":"外出する、家を出る","answer":"出门<br><small>chūmén</small>"},{"id":"c8-064","ja":"酒","answer":"酒<br><small>jiǔ</small>"},{"id":"c8-065","ja":"株、株式","answer":"股票<br><small>gǔpiào</small>"},{"id":"c8-066","ja":"値上がりする、上昇する","answer":"涨<br><small>zhǎng</small>"}]}'''
              marker = '};\nconst DAY='
              if marker not in s:
                  raise SystemExit('DECKS marker not found')
              s = s.replace(marker, ',"chinese-8":' + deck + '};\nconst DAY=', 1)
              p.write_text(s, encoding='utf-8')
      - name: Commit lesson data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Add Chinese lesson 8 deck"
          git push
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
