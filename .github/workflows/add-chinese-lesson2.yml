name: Add Chinese Lesson 2

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/add-chinese-lesson2.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index
        shell: python
        run: |
          from pathlib import Path
          p = Path("index.html")
          s = p.read_text(encoding="utf-8")
          if '"chinese-2"' in s:
              raise SystemExit(0)
          deck = '{"label":"中国語 第2課","subtitle":"表：日本語 ／ 裏：中国語＋拼音","backLabel":"中国語・拼音","words":[{"id":"c2-001","ja":"キャンパス、校区","answer":"校区<br><small>xiàoqū</small>"},{"id":"c2-002","ja":"ある、いる、持っている","answer":"有<br><small>yǒu</small>"},{"id":"c2-003","ja":"演奏会、コンサート","answer":"演奏会<br><small>yǎnzòuhuì</small>"},{"id":"c2-004","ja":"講演、スピーチをする","answer":"演讲<br><small>yǎnjiǎng</small>"},{"id":"c2-005","ja":"試合、競技、コンテスト","answer":"比赛<br><small>bǐsài</small>"},{"id":"c2-006","ja":"朝、午前","answer":"早上<br><small>zǎoshang</small>"},{"id":"c2-007","ja":"～名（人を数える丁寧な量詞）","answer":"位<br><small>wèi</small>"},{"id":"c2-008","ja":"おはよう","answer":"早<br><small>zǎo</small>"},{"id":"c2-009","ja":"楊（姓）","answer":"杨<br><small>Yáng</small>"},{"id":"c2-010","ja":"初めて","answer":"初次<br><small>chūcì</small>"},{"id":"c2-011","ja":"会う、顔を合わせる","answer":"见面<br><small>jiànmiàn</small>"},{"id":"c2-012","ja":"世話をする、よろしく取り計らう","answer":"关照<br><small>guānzhào</small>"},{"id":"c2-013","ja":"～したい、～しようと思う","answer":"想<br><small>xiǎng</small>"},{"id":"c2-014","ja":"聞く、聴く","answer":"听<br><small>tīng</small>"},{"id":"c2-015","ja":"何、どんな","answer":"什么<br><small>shénme</small>"},{"id":"c2-016","ja":"時、ころ","answer":"时候<br><small>shíhou</small>"},{"id":"c2-017","ja":"ネット、網","answer":"网<br><small>wǎng</small>"},{"id":"c2-018","ja":"通知、知らせる","answer":"通知<br><small>tōngzhī</small>"},{"id":"c2-019","ja":"～日、番号","answer":"号<br><small>hào</small>"},{"id":"c2-020","ja":"夜、晩","answer":"晚上<br><small>wǎnshang</small>"},{"id":"c2-021","ja":"～時","answer":"点<br><small>diǎn</small>"},{"id":"c2-022","ja":"半分、30分","answer":"半<br><small>bàn</small>"},{"id":"c2-023","ja":"始まる、始める","answer":"开始<br><small>kāishǐ</small>"},{"id":"c2-024","ja":"曜日、週","answer":"星期<br><small>xīngqī</small>"},{"id":"c2-025","ja":"家、家庭","answer":"家<br><small>jiā</small>"},{"id":"c2-026","ja":"用事、事柄","answer":"事<br><small>shì</small>"},{"id":"c2-027","ja":"週","answer":"周<br><small>zhōu</small>"},{"id":"c2-028","ja":"時間","answer":"时间<br><small>shíjiān</small>"},{"id":"c2-029","ja":"現在、目下","answer":"目前<br><small>mùqián</small>"},{"id":"c2-030","ja":"ない、持っていない","answer":"没有<br><small>méiyǒu</small>"},{"id":"c2-031","ja":"手配する、予定を組む","answer":"安排<br><small>ānpái</small>"},{"id":"c2-032","ja":"それなら、では","answer":"那<br><small>nà</small>"},{"id":"c2-033","ja":"ちょうどよい","answer":"正好<br><small>zhènghǎo</small>"},{"id":"c2-034","ja":"2人、2つ","answer":"俩<br><small>liǎ</small>"},{"id":"c2-035","ja":"一緒に","answer":"一起<br><small>yìqǐ</small>"},{"id":"c2-036","ja":"行く","answer":"去<br><small>qù</small>"},{"id":"c2-037","ja":"建物、階","answer":"楼<br><small>lóu</small>"},{"id":"c2-038","ja":"コピー機","answer":"复印机<br><small>fùyìnjī</small>"},{"id":"c2-039","ja":"大学","answer":"大学<br><small>dàxué</small>"},{"id":"c2-040","ja":"医学部、医科大学","answer":"医学院<br><small>yīxuéyuàn</small>"},{"id":"c2-041","ja":"サークル、団体","answer":"社团<br><small>shètuán</small>"},{"id":"c2-042","ja":"活動","answer":"活动<br><small>huódòng</small>"},{"id":"c2-043","ja":"兄弟","answer":"兄弟<br><small>xiōngdì</small>"},{"id":"c2-044","ja":"姉妹","answer":"姐妹<br><small>jiěmèi</small>"},{"id":"c2-045","ja":"西安","answer":"西安<br><small>Xī’ān</small>"},{"id":"c2-046","ja":"洛陽","answer":"洛阳<br><small>Luòyáng</small>"},{"id":"c2-047","ja":"古都","answer":"古都<br><small>gǔdū</small>"},{"id":"c2-048","ja":"旅行する","answer":"旅行<br><small>lǚxíng</small>"},{"id":"c2-049","ja":"漫画","answer":"漫画<br><small>mànhuà</small>"},{"id":"c2-050","ja":"『西遊記』","answer":"西游记<br><small>Xīyóujì</small>"},{"id":"c2-051","ja":"『水滸伝』","answer":"水浒传<br><small>Shuǐhǔzhuàn</small>"},{"id":"c2-052","ja":"『三国志演義』","answer":"三国演义<br><small>Sānguóyǎnyì</small>"},{"id":"c2-053","ja":"『紅楼夢』","answer":"红楼梦<br><small>Hónglóumèng</small>"},{"id":"c2-054","ja":"文学","answer":"文学<br><small>wénxué</small>"},{"id":"c2-055","ja":"名作、名著","answer":"名著<br><small>míngzhù</small>"},{"id":"c2-056","ja":"トイレ、洗面所","answer":"洗手间<br><small>xǐshǒujiān</small>"},{"id":"c2-057","ja":"休暇を取る、休みを願い出る","answer":"请假<br><small>qǐngjià</small>"},{"id":"c2-058","ja":"出勤する、仕事をする","answer":"上班<br><small>shàngbān</small>"},{"id":"c2-059","ja":"大～、年上の～","answer":"大<br><small>dà</small>"},{"id":"c2-060","ja":"SF、サイエンスフィクション","answer":"科幻<br><small>kēhuàn</small>"},{"id":"c2-061","ja":"作家","answer":"作家<br><small>zuòjiā</small>"},{"id":"c2-062","ja":"探す、見つける","answer":"找<br><small>zhǎo</small>"},{"id":"c2-063","ja":"傘","answer":"雨伞<br><small>yǔsǎn</small>"},{"id":"c2-064","ja":"食べる","answer":"吃<br><small>chī</small>"},{"id":"c2-065","ja":"飲む","answer":"喝<br><small>hē</small>"},{"id":"c2-066","ja":"飲み物","answer":"饮料<br><small>yǐnliào</small>"},{"id":"c2-067","ja":"出発する","answer":"出发<br><small>chūfā</small>"},{"id":"c2-068","ja":"昨日","answer":"昨天<br><small>zuótiān</small>"},{"id":"c2-069","ja":"積雪","answer":"积雪<br><small>jīxuě</small>"},{"id":"c2-070","ja":"センチメートル","answer":"厘米<br><small>límǐ</small>"},{"id":"c2-071","ja":"今、現在","answer":"现在<br><small>xiànzài</small>"},{"id":"c2-072","ja":"時、時計","answer":"钟<br><small>zhōng</small>"},{"id":"c2-073","ja":"分","answer":"分<br><small>fēn</small>"},{"id":"c2-074","ja":"2、2つ","answer":"两<br><small>liǎng</small>"},{"id":"c2-075","ja":"15分、四分の一時間","answer":"刻<br><small>kè</small>"},{"id":"c2-076","ja":"～分前、不足する、違う","answer":"差<br><small>chà</small>"},{"id":"c2-077","ja":"ゼロ","answer":"零<br><small>líng</small>"},{"id":"c2-078","ja":"ビル、大きな建物","answer":"大楼<br><small>dàlóu</small>"},{"id":"c2-079","ja":"広場","answer":"广场<br><small>guǎngchǎng</small>"},{"id":"c2-080","ja":"公園","answer":"公园<br><small>gōngyuán</small>"},{"id":"c2-081","ja":"山","answer":"山<br><small>shān</small>"},{"id":"c2-082","ja":"海","answer":"海<br><small>hǎi</small>"},{"id":"c2-083","ja":"門のそば、入口の脇","answer":"门旁<br><small>ménpáng</small>"},{"id":"c2-084","ja":"道端、道路のそば","answer":"路旁<br><small>lùpáng</small>"},{"id":"c2-085","ja":"床","answer":"地板<br><small>dìbǎn</small>"},{"id":"c2-086","ja":"水","answer":"水<br><small>shuǐ</small>"},{"id":"c2-087","ja":"気をつける、注意する","answer":"小心<br><small>xiǎoxīn</small>"},{"id":"c2-088","ja":"郵便受け、メールボックス","answer":"信箱<br><small>xìnxiāng</small>"},{"id":"c2-089","ja":"手紙","answer":"信<br><small>xìn</small>"},{"id":"c2-090","ja":"今日","answer":"今天<br><small>jīntiān</small>"},{"id":"c2-091","ja":"子ども","answer":"小朋友<br><small>xiǎopéngyou</small>"},{"id":"c2-092","ja":"～歳","answer":"岁<br><small>suì</small>"},{"id":"c2-093","ja":"欲しい、～したい、必要である","answer":"要<br><small>yào</small>"},{"id":"c2-094","ja":"ビール","answer":"啤酒<br><small>píjiǔ</small>"},{"id":"c2-095","ja":"瓶、～本","answer":"瓶<br><small>píng</small>"},{"id":"c2-096","ja":"第～","answer":"第<br><small>dì</small>"},{"id":"c2-097","ja":"ページ","answer":"页<br><small>yè</small>"}]}'
          marker = '};\nconst DAY='
          if marker not in s:
              raise SystemExit("DECKS marker not found")
          s = s.replace(marker, ',"chinese-2":' + deck + '};\nconst DAY=', 1)
          p.write_text(s, encoding="utf-8")
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Add Chinese lesson 2 deck"
          git push
